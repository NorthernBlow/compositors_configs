# Starship — runic teal theme
# Palette: #8DA399 (muted teal), #98d1ce (bright teal), #edb54b (yellow), #26a98b (green)

format = """
[┌──────────ᛋᛋ─────────>](#8DA399)
[ᚠ](#8DA399)$os$hostname$directory$git_branch$git_status$python$package$docker_context$kubernetes$terraform$cmd_duration
[└─](#8DA399) """

[os]
disabled = false
style = "fg:#8DA399"

[os.symbols]
Arch = " "

[hostname]
ssh_only = true
format = "[$ssh_symbol](bold #98d1ce)[$hostname](bold red) "
trim_at = ""
disabled = false

[directory]
style = "fg:#98d1ce bold"
truncation_length = 4
truncate_to_repo = true
read_only = " "

[git_branch]
symbol = " "
style = "fg:#edb54b"
format = "[$symbol$branch]($style) "

[git_status]
ahead = "⇡${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
behind = "⇣${count}"
up_to_date = "✓"
untracked = "?${count}"
modified = "~${count}"
staged = "+${count}"
deleted = "-${count}"
renamed = "»${count}"
stashed = "*${count}"
conflicted = "⚡${count}"
style = "fg:#26a98b"
format = "([$all_status$ahead_behind]($style)) "

[python]
symbol = " "
style = "fg:#8DA399"
format = "[$symbol$version]($style) "
detect_extensions = ["py"]
detect_files = [".python-version", "requirements.txt", "__init__.py", "pyproject.toml", "setup.py"]

[package]
symbol = "󰏗 "
style = "fg:#8DA399 dimmed"
format = "[$symbol$version]($style) "
disabled = false

[docker_context]
symbol = " "
style = "fg:#33859d"
format = "[$symbol$context]($style) "
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile"]

[kubernetes]
symbol = "⎈ "
style = "fg:#33859d"
format = "[$symbol$context( \\($namespace\\))]($style) "
disabled = false
detect_folders = ["charts", "helmfile.d"]
detect_files = ["helmfile.yaml", "Chart.yaml"]

[kubernetes.context_aliases]
"minikube" = "кубернетиксы ваши"

[terraform]
symbol = "󱁢 "
style = "fg:#8DA399"
format = "[$symbol$workspace]($style) "
detect_extensions = ["tf", "tfvars"]

[terraform.context_aliases]
"default" = "terraform"

[cmd_duration]
min_time = 2000
style = "fg:#edb54b dimmed"
format = "[󱦟 $duration]($style) "